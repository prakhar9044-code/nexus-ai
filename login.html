<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Login to Nexus — Your AI Career & Study Platform">
<title>Nexus — Sign In</title>
<link rel="icon" href="assets/logo.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0b10">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<!-- Animated background -->
<div class="login-bg">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-grid"></div>
</div>

<!-- Login Card -->
<div class="login-wrapper">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <img src="assets/logo.png" alt="Nexus" class="login-logo-img">
            <div class="login-logo-glow"></div>
        </div>
        <h1 class="login-title">Welcome to <span class="gradient-text">Nexus</span></h1>
        <p class="login-subtitle">Your AI-powered career & study platform</p>

        <!-- Tab Switcher -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" data-tab="login">Log In</button>
            <button class="auth-tab" id="tab-signup" data-tab="signup">Sign Up</button>
            <div class="auth-tab-indicator" id="tab-indicator"></div>
        </div>

        <!-- Login Form -->
        <form class="auth-form active" id="form-login" autocomplete="on">
            <div class="input-group">
                <input type="email" id="login-email" required autocomplete="email">
                <label for="login-email">Email address</label>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" required autocomplete="current-password">
                <label for="login-password">Password</label>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <button type="button" class="password-toggle" id="login-pw-toggle" tabindex="-1">👁</button>
            </div>
            <a href="#" class="forgot-link" id="forgot-password">Forgot password?</a>
            <button type="submit" class="auth-btn primary-btn" id="login-btn">
                <span class="btn-text">Log In</span>
                <div class="btn-loader"></div>
            </button>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="form-signup" autocomplete="on">
            <div class="input-group">
                <input type="text" id="signup-name" required autocomplete="name">
                <label for="signup-name">Full name</label>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="input-group">
                <input type="email" id="signup-email" required autocomplete="email">
                <label for="signup-email">Email address</label>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div class="input-group">
                <input type="password" id="signup-password" required minlength="6" autocomplete="new-password">
                <label for="signup-password">Password (min 6 chars)</label>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <button type="button" class="password-toggle" id="signup-pw-toggle" tabindex="-1">👁</button>
            </div>
            <button type="submit" class="auth-btn primary-btn" id="signup-btn">
                <span class="btn-text">Create Account</span>
                <div class="btn-loader"></div>
            </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider"><span>or continue with</span></div>

        <!-- Social Login -->
        <div class="social-btns">
            <button class="auth-btn social-btn google-btn" id="google-login">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                <span>Google</span>
            </button>
            <button class="auth-btn social-btn github-btn" id="github-login">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                <span>GitHub</span>
            </button>
        </div>

        <!-- Error/Success Message -->
        <div class="auth-message" id="auth-message"></div>

        <!-- Footer -->
        <div class="login-footer">
            <p>Built with ❤️ by <strong>Prakhar</strong></p>
        </div>
    </div>
</div>

<!-- Firebase SDK (compat for non-module env) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
// If already logged in, redirect to main app
auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'index.html';
});

// Tab switching
const tabs = document.querySelectorAll('.auth-tab');
const forms = document.querySelectorAll('.auth-form');
const indicator = document.getElementById('tab-indicator');

tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        forms.forEach(f => f.classList.remove('active'));
        document.getElementById('form-' + target).classList.add('active');
        indicator.style.transform = target === 'signup' ? 'translateX(100%)' : 'translateX(0)';
        clearMessage();
    });
});

// Password toggle
document.getElementById('login-pw-toggle').addEventListener('click', () => {
    const inp = document.getElementById('login-password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
});
document.getElementById('signup-pw-toggle').addEventListener('click', () => {
    const inp = document.getElementById('signup-password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
});

// Show message
function showMessage(text, type = 'error') {
    const el = document.getElementById('auth-message');
    el.textContent = text;
    el.className = 'auth-message ' + type;
    el.classList.add('show');
    if (type === 'error') el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 500);
}
function clearMessage() {
    const el = document.getElementById('auth-message');
    el.classList.remove('show');
}

function setLoading(btn, loading) {
    btn.classList.toggle('loading', loading);
    btn.disabled = loading;
}

// Email Login
document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    setLoading(btn, true);
    try {
        await Auth.loginEmail(email, password);
        showMessage('✅ Welcome back!', 'success');
    } catch (err) {
        const msg = err.code === 'auth/user-not-found' ? 'No account found with this email'
            : err.code === 'auth/wrong-password' ? 'Incorrect password'
            : err.code === 'auth/invalid-credential' ? 'Invalid email or password'
            : err.code === 'auth/too-many-requests' ? 'Too many attempts. Try again later.'
            : err.message;
        showMessage(msg);
    } finally { setLoading(btn, false); }
});

// Email Signup
document.getElementById('form-signup').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signup-btn');
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    if (!name) { showMessage('Please enter your name'); return; }
    if (password.length < 6) { showMessage('Password must be at least 6 characters'); return; }
    setLoading(btn, true);
    try {
        await Auth.signUpEmail(email, password, name);
        showMessage('🎉 Account created! Redirecting...', 'success');
    } catch (err) {
        const msg = err.code === 'auth/email-already-in-use' ? 'This email is already registered. Try logging in!'
            : err.code === 'auth/weak-password' ? 'Password is too weak. Use 6+ characters.'
            : err.message;
        showMessage(msg);
    } finally { setLoading(btn, false); }
});

// Google Login
document.getElementById('google-login').addEventListener('click', async () => {
    try {
        await Auth.loginGoogle();
    } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') showMessage(err.message);
    }
});

// GitHub Login
document.getElementById('github-login').addEventListener('click', async () => {
    try {
        await Auth.loginGithub();
    } catch (err) {
        if (err.code === 'auth/account-exists-with-different-credential') {
            showMessage('An account with this email already exists. Try Google login.');
        } else if (err.code !== 'auth/popup-closed-by-user') {
            showMessage(err.message);
        }
    }
});

// Forgot Password
document.getElementById('forgot-password').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showMessage('Enter your email first, then click Forgot password'); return; }
    try {
        await Auth.resetPassword(email);
        showMessage('📧 Password reset email sent! Check your inbox.', 'success');
    } catch (err) {
        showMessage('Could not send reset email. Check the email address.');
    }
});
</script>
</body>
</html>
